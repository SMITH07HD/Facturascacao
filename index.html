<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CACAO FACTURACION</title>

    <!-- smartphones -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d32f2f">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="styles.css">

    <style>
        /* Pantalla de carga */
        #cargando {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            font-size: 1.3rem;
            gap: 16px;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>

<!-- PANTALLA DE CARGA -->
<div id="cargando">
    <div class="spinner"></div>
    <span>Cargando productos...</span>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-danger px-3 d-flex flex-wrap gap-2">
    <span class="navbar-brand mb-0 h1">
        🍔 CACAO FACTURAS
    </span>
    <button class="btn btn-light" onclick="location.reload()">
        🏠 Inicio
    </button>
    <button onclick="verHistorial()" class="btn btn-warning">
        📚 Historial de Ventas
    </button>
</nav>

<!-- CONTENIDO PRINCIPAL -->
<div class="container-fluid mt-3">
    <div class="row">

        <!-- PRODUCTOS -->
        <div class="col-md-8">
            <div class="row" id="productos"></div>
        </div>

        <!-- CARRITO -->
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body text-center">

                    <!-- LOGO -->
                    <img src="logo.png" alt="Logo"
                         style="width:100px; margin-bottom:10px;"
                         onerror="this.style.display='none'">

                    <h4>🛒 Carrito</h4>

                    <ul id="lista" class="list-group mb-3"></ul>

                    <div id="total" class="mb-3">Total: $0.00</div>

                    <hr>

                    <h5>Datos del Cliente</h5>
                    <input type="text"   id="cliente"   class="form-control mb-2" placeholder="Nombre del cliente">
                    <input type="number" id="telefono"  class="form-control mb-2" placeholder="Teléfono">
                    <input type="text"   id="direccion" class="form-control mb-2" placeholder="Dirección">

                    <button onclick="imprimir()" class="btn btn-success w-100 mt-2" style="font-size:18px;">
                        💳 Imprimir Factura
                    </button>

                </div>
            </div>
        </div>

    </div>
</div>

<!-- FORMULARIO NUEVO PRODUCTO -->
<!-- FORMULARIO NUEVO PRODUCTO (colapsable) -->
<div class="container-fluid mt-3">
    <div class="card">
        <!-- HEADER CLICKEABLE -->
        <div onclick="toggleFormulario()" style="
            display:flex;justify-content:space-between;align-items:center;
            padding:14px 16px;cursor:pointer;
            background:#1e293b;color:white;border-radius:8px;
            user-select:none;">
            <span style="font-weight:700;font-size:15px;">➕ Agregar Producto</span>
            <span id="flecha-formulario" style="font-size:20px;transition:transform .3s;">▼</span>
        </div>

        <!-- CONTENIDO COLAPSABLE -->
        <div id="formulario-body" style="
            overflow:hidden;
            max-height:0;
            transition:max-height .4s ease, padding .3s ease;
            padding:0 16px;">

            <div style="padding-bottom:16px;padding-top:12px;">
                <input type="text"   id="nuevoNombre"   class="form-control mb-2" placeholder="Nombre del producto">
                <input type="number" id="nuevoPrecio"   class="form-control mb-2" placeholder="Precio">
                <input type="text"   id="nuevaImagen"   class="form-control mb-2" placeholder="URL de imagen (opcional)">
                <input type="file"   id="imagenArchivo" class="form-control mb-2" accept="image/*">

                <select id="nuevaCategoria" class="form-control mb-2">
                    <option value="yaroas">🍟 Yaroas</option>
                    <option value="chimis">🌭 Chimis y Sandwiches</option>
                    <option value="empanadas">🥟 Empanadas</option>
                    <option value="bebidas">🥤 Bebidas</option>
                </select>

                <button onclick="agregarNuevoProducto()" class="btn btn-primary w-100">
                    💾 Guardar Producto
                </button>
            </div>
        </div>
    </div>
</div>


<!-- ⚡ SUPABASE (cargar ANTES de script.js) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Tu JS -->
<script src="script.js"></script>

<!-- BOTÓN FLOTANTE MOBILE -->
<button id="fab-agregar" onclick="abrirFormularioMobile()"
    style="display:none;position:fixed;bottom:24px;right:24px;z-index:8000;
    width:60px;height:60px;border-radius:50%;border:none;
    background:#d32f2f;color:white;font-size:28px;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);cursor:pointer;">
    ➕
</button>

<!-- BOTTOM SHEET AGREGAR PRODUCTO (mobile) -->
<div id="fab-bg" onclick="cerrarFormularioMobile()"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:8001;"></div>

<div id="fab-sheet" style="
    position:fixed;bottom:0;left:0;right:0;z-index:8002;
    background:#1e293b;color:white;
    border-radius:20px 20px 0 0;
    padding:20px 20px 40px;
    transform:translateY(100%);
    transition:transform .35s cubic-bezier(.32,.72,0,1);
    max-height:90vh;overflow-y:auto;">

    <div style="width:40px;height:4px;background:#475569;border-radius:4px;margin:0 auto 20px;"></div>
    <h5 style="color:white;margin-bottom:16px;font-weight:700;">➕ Agregar Producto</h5>

    <input type="text"   id="nuevoNombre2"   class="form-control mb-2" placeholder="Nombre del producto">
    <input type="number" id="nuevoPrecio2"   class="form-control mb-2" placeholder="Precio">
    <input type="text"   id="nuevaImagen2"   class="form-control mb-2" placeholder="URL de imagen (opcional)">
    <input type="file"   id="imagenArchivo2" class="form-control mb-2" accept="image/*">

    <select id="nuevaCategoria2" class="form-control mb-2">
        <option value="yaroas">🍟 Yaroas</option>
        <option value="chimis">🌭 Chimis y Sandwiches</option>
        <option value="empanadas">🥟 Empanadas</option>
        <option value="bebidas">🥤 Bebidas</option>
    </select>

    <button onclick="agregarNuevoProductoMobile()" class="btn btn-danger w-100 mt-2"
        style="padding:14px;font-size:16px;font-weight:700;">
        💾 Guardar Producto
    </button>
</div>


</body>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-3">
    <p>© 2026 CACAO Picaderas & Antojos</p>
    <p>📘 Facebook | 📸 Instagram | 💬 WhatsApp</p>
</footer>

</html>
